<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPAS AI應用規劃師（初級）百題互動測驗系統</title>
    <script src="https://www.gstatic.com/firebasejs/4.12.1/firebase.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f9; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        /* 🚀 核心升級二：新增填寫姓名/暱稱的樣式 */
        .user-box { background: #f3f4f6; padding: 15px; border-radius: 6px; margin-bottom: 25px; text-align: center; border: 1px dashed #cbd5e1; }
        .user-box input { padding: 8px 12px; font-size: 1em; border: 1px solid #cbd5e1; border-radius: 4px; width: 60%; max-width: 250px; }
        
        .quiz-item { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #e5e7eb; }
        .question { font-weight: bold; font-size: 1.1em; margin-bottom: 12px; color: #111827; }
        .options { list-style: none; padding: 0; margin: 0; }
        .options li { margin-bottom: 8px; }
        .options label { display: block; padding: 10px 15px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .options label:hover { background: #f3f4f6; }
        .options input[type="radio"] { margin-right: 10px; transform: scale(1.1); }
        
        /* 即時反饋樣式 */
        .feedback { margin-top: 10px; padding: 12px; border-radius: 6px; display: none; font-size: 0.95em; }
        .feedback.correct { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .feedback.incorrect { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .rationale { margin-top: 5px; font-weight: normal; color: #4b5563; }
        
        /* 按鈕與分數顯示 */
        .btn-submit { display: block; width: 100%; max-width: 200px; margin: 30px auto; padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 2px 4px rgba(37,99,235,0.3); transition: background 0.2s; }
        .btn-submit:hover { background: #1d4ed8; }
        .result-box { display: none; margin-top: 25px; padding: 20px; background: #eff6ff; border: 2px solid #bfdbfe; border-radius: 8px; text-align: center; }
        .score { font-size: 2em; font-weight: bold; color: #2563eb; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>iPAS AI 應用規劃師（初級）</h1>
    <div class="subtitle">科目 1 與 科目 2 百題全真模擬互動題庫</div>
    
    <div class="user-box">
        <label for="username"><b>✍️ 請輸入您的姓名或暱稱以開始測驗：</b></label>
        <input type="text" id="username" placeholder="例：林小明" required>
    </div>
    
    <form id="quizForm">
        <div id="quizContainer"></div>
        <button type="button" class="btn-submit" onclick="calculateScore()">交卷結算分數</button>
    </form>
    
    <div class="result-box" id="resultBox">
        <h2>🎉 測驗結束</h2>
        <div id="scoreResult"></div>
        <p>成績已成功同步至雲端系統！您可以往上滑查看每題的詳細解析與答錯的地方喔！</p>
    </div>
</div>

<script>
// ========================================================
// 🚀 核心升級四：請在此處填入你剛才開通的 Firebase 資料庫網址
// ========================================================
const config = {
    databaseURL: "https://ipas-quiz-db-default-rtdb.firebaseio.com/" 
};
firebase.initializeApp(config);
const database = firebase.database();

// 100題完整資料庫
const quizData = [
    { n: 1, q: "主要用於分析大量數據以「洞悉數據模式」的 AI 類型為何？", o: ["分析型 AI", "預測型 AI", "生成型 AI", "規則型 AI"], a: 0, r: "分析型 AI 的核心即為洞悉數據模式。", h: "關鍵字在於「洞悉數據模式」而非預測未來。" },
    { n: 2, q: "基於歷史資料和數據，「預測未來趨勢與行為」的是哪種 AI 類型？", o: ["分析型 AI", "預測型 AI", "生成型 AI", "鑑別式 AI"], a: 1, r: "預測未來趨勢正是預測型 AI 的定義。", h: "名稱直接對應到「預測未來」的描述。" },
    { n: 3, q: "近年快速發展，可根據「提示詞（prompt）生成文字、圖像」的 AI 類型為？", o: ["分析型 AI", "預測型 AI", "生成型 AI", "傳統型 AI"], a: 2, r: "根據提示詞生成文字與影音是其核心特徵。", h: "這類 AI 的核心功能是「生成」新內容。" },
    { n: 4, q: "根據文件所述，人工智慧（AI）本質上是一種旨在模擬什麼的技術？", o: ["人類智慧", "硬體速度", "網路頻寬", "工廠機械"], a: 0, r: "AI 的核心目標就是模擬人類的學習與推理能力。", h: "名稱中的「智慧」代表其模擬對象。" },
    { n: 5, q: "在醫療領域，利用 AI 分析醫學影像（如 X 光片）以輔助精準診斷，屬於？", o: ["疾病診斷", "藥物研發", "個人化醫療", "自動化生產"], a: 0, r: "輔助醫學影像分析屬於疾病診斷應用。", h: "分析 X 光片能幫助醫師找出病灶。" },
    { n: 6, q: "透過 AI 進行「藥物分子結構模擬」，大幅縮短研發時間屬於哪項醫學應用？", o: ["疾病診斷", "藥物研發", "個人化醫療", "預測性維護"], a: 1, r: "分子模擬是加速研發新藥的關鍵技術。", h: "這與發明新藥物的研究階段有關。" },
    { n: 7, q: "金融業中，AI 透過「實時監控交易行為」以降低詐欺風險，屬於下列何者？", o: ["風險評估", "欺詐檢測", "自動交易", "產品設計"], a: 1, r: "實時監控異常模式以防詐騙即為欺詐檢測。", h: "尋找防範「詐欺行為」對應的技術名稱。" },
    { n: 8, q: "製造業中，AI 分析設備運行數據以「提前預測並預防機器故障」，稱為？", o: ["自動化生產", "品質控制", "預測性維護", "庫存管理"], a: 2, r: "提前預防故障即為預測性維護的核心目標。", h: "這涉及在設備壞掉之前進行「維護」。" },
    { n: 9, q: "交通領域中，AI 技術結合感測器與導航系統，實現汽車精準控制與？", o: ["路徑規劃", "車體焊接", "駕照考核", "機油更換"], a: 0, r: "自動駕駛的核心包含精準控制與路徑規劃。", h: "車輛行駛時需要決定怎麼走最安全安全、快速。" },
    { n: 10, q: "下列何者「不屬於」人工智慧多層次應用架構中的技術底層要素？", o: ["資料處理與分析", "演算法與機器學習", "自動駕駛汽車落地商品", "深度學習框架"], a: 2, r: "商品落地屬於應用架構中的「實際運用」層。", h: "尋找屬於「最終落地產品」而非「技術底層」的選項。" },
    { n: 11, q: "「基於規則與知識庫，模擬人類專家決策過程」的技術稱為？", o: ["專家系統", "深度學習", "強化學習", "非監督式學習"], a: 0, r: "專家系統依賴定義好的規則與知識庫運作。", h: "其名稱直接包含「專家」二字。" },
    { n: 12, q: "在數據基本概念中，具有清晰且固定行列結構的 MySQL 資料庫記錄屬於？", o: ["結構化數據", "半結構化數據", "非結構化數據", "多元化數據"], a: 0, r: "行列固定且易於查詢即為結構化數據。", h: "關聯式資料庫具有高度固定的表格架擁。" },
    { n: 13, q: "「格式靈活、具有標籤但無需遵循固定架構」的 JSON 檔案被歸類為？", o: ["結構化數據", "半結構化數據", "非結構化數據", "靜態數據"], a: 1, r: "JSON、XML 等標籤文件屬於半結構化數據。", h: "它介於完全固定與完全沒有結構之間。" },
    { n: 14, q: "下列哪一種數據類型屬於「非結構化數據」的實例？", o: ["Excel 試算表", "CSV 檔案", "圖片、音訊與自由文本文章", "SQL 資料庫"], a: 2, r: "無固定架構的多媒體與文章屬於非結構化數據。", h: "尋找沒有固定行列、需要經解析才能分析的多媒體或純文字。" },
    { n: 15, q: "利用程式自動擷取網站公開數據（如商品評論、價格資訊）的技術稱為？", o: ["資料加密", "網路爬蟲（Web Scraping）", "資料離散化", "主成分分析"], a: 1, r: "網頁爬蟲專用於擷取網站公開資訊。", h: "像是蜘蛛在網路上爬行收集資料的隱喻技術。" },
    { n: 16, q: "在資料清洗中，當遇到數據某欄位沒有記錄有效數據時，稱為？", o: ["遺缺值", "重複值", "錯誤值", "離群值"], a: 0, r: "欄位空白無記錄即為遺缺值（Missing Value）。", h: "代表數值「不見了」或「漏掉了」。" },
    { n: 17, q: "處理「重複值」時，最標準的做法流程是？", o: ["全部刪除不留任何記錄", "保留一份正確的記錄，刪除其他重複項", "使用平均值填補所有欄位", "不做任何處理直接進行訓練"], a: 1, r: "此為處理重複資料的正確標準步驟。", h: "同樣的紀錄有多個，我們只需要留下一個。" },
    { n: 18, q: "當數據中的年齡欄位出現負數（如 -5 歲），在清洗中屬於？", o: ["遺缺值", "錯誤值", "離群值", "重複值"], a: 1, r: "不符合現實與合理範圍的數值屬於錯誤值。", h: "人在現實生活中是不可能擁有負數年記的。" },
    { n: 19, q: "關於離群值（Outlier），下列敘述何者正確？", o: ["It一定是人為錄入的錯誤值", "它是指遠離大多數其他數據點的異常值", "必須在第一步無條件直接刪除", "它就是遺缺值的另一種叫法"], a: 1, r: "此為離群值的標準定義。", h: "想像大多數點都在一起，只有它離大家特別遠。" },
    { n: 20, q: "將數據從 CSV 格式轉換為 JSON 格式，屬於數據轉換中的？", o: ["數據格式轉換", "數據類型轉換", "數據正規化", "數據離散化"], a: 0, r: "格式轉換是指在不同檔案架構間轉換。", h: "這是在更換檔案的儲存構造。" },
    { n: 21, q: "將原本以「字串」儲存的金額轉換為「數值」以利計算，屬於？", o: ["數據格式轉換", "數據類型轉換", "數據縮減", "探索性分析"], a: 1, r: "改變欄位的基礎編碼資料型態即為類型轉換。", h: "這涉及到程式內部的資料型別更換。" },
    { n: 22, q: "數據正規化（Normalization）的最主要目的是？", o: ["將文字全部翻譯成英文", "消除不同變數之間的單位影響，使數據具可比性", "刪除所有包含極端值的紀錄", "將非結構化數據轉為半結構化"], a: 1, r: "正規化將數值縮放至固定區間以消除單位干擾。", h: "這樣可以讓身高（公分）和體重（公斤）在同一個基準比較。" },
    { n: 23, q: "將連續型的年齡數據劃分為「青年、中年、老年」三個類別，屬於？", o: ["數據標準化", "數據離散化", "數據縮減", "關聯分析"], a: 1, r: "將連續特徵切分成離散的區間或類別即為離散化。", h: "把數值切成一段一段的分組標籤。" },
    { n: 24, q: "主成分分析（PCA）主要是透過何種方式進行數據轉換？", o: ["逐字預測下一個詞", "透過降維技術減少數據的維度或體積", "自動填補所有欄位的缺失值", "建立專家決策樹規則"], a: 1, r: "PCA 核心在於壓縮高維冗餘特徵空間。", h: "這是在高維度空間中找最主要的方向來降低維度。" },
    { n: 25, q: "「描述數據的基本特徵和分佈情況」是哪種數據分析的主要方法？", o: ["敘述性分析", "診斷性分析", "預測性分析", "處方性分析"], a: 0, r: "敘述性分析利用統計指標總結數據基本分佈。", h: "這種分析通常會算平均數和畫直方圖。" },
    { n: 26, q: "關於統計指標「平均值（Mean）」，其最主要的缺點是？", o: ["計算公式過於繁瑣複雜", "極易受極端值（離群值）的影響而偏離中心趨勢", "無法用於任何數值型數據", "對數據分布的變動性完全不敏感"], a: 1, r: "極端大或極端小的值會大幅拉動平均值。", h: "想像班上有一個人的收入高達好幾億，會對全班平均造成什麼影響。" },
    { n: 27, q: "統計量中，「不受極端值影響，能更好反映典型水平」的是？", o: ["平均值", "中位數", "標準差", "全距"], a: 1, r: "中位數只取正中間的值，故能免疫極端值拉動。", h: "它是把所有數字排排站之後，正中間的那一個。" },
    { n: 28, q: "標準差（Standard Deviation）主要用來衡量一組資料的？", o: ["中心集中趨勢", "分散程度", "數據樣本總量", "數據採集速度"], a: 1, r: "標準差越大，代表資料點離平均值的距離越遠（分散度高）。", h: "數值越大代表資料彼此之間差距越大、越不穩定。" },
    { n: 29, q: "關於百分位數（Percentile），下列敘述何者正確？", o: ["它極易受到離群值拉動", "能詳細描述數據分佈情況且不受極端值影響", "只能將數據平分成兩等份", "計算難度比標準差大十倍"], a: 1, r: "這是百分位數的核心技術優點。", h: "它將資料由小到大排列並切成 100 份。" },
    { n: 30, q: "主要用於「直觀展示連續型數據分布、快速了解整體樣貌」的圖表是？", o: ["折線圖", "直方圖（Histogram）", "雷達圖", "散佈圖"], a: 1, r: "直方圖能直觀顯現連續型資料的集中與分散區間。", h: "它是由一根根緊鄰的矩形高度代表各組別區間個數。" },
    { n: 31, q: "若想「直觀顯示兩個變量之間的相關性」，最適合使用？", o: ["散佈圖（Scatter plot）", "折線圖", "圓餅圖", "雷達圖"], a: 0, r: "散佈圖上的點能清晰看出兩個軸變量的正負相關性。", h: "圖上的每個點位置由這兩個變量的值共同決定。" },
    { n: 32, q: "「顯示數據隨時間或其他連續變量的變化趨勢」最理想的統計圖表是？", o: ["直方圖", "折線圖（Line chart）", "盒鬚圖", "散佈圖"], a: 1, r: "折線圖連線能完美凸顯時間序列的起伏趨勢。", h: "股票走勢圖或按月業績圖通常都是用這種類型。" },
    { n: 33, q: "探索性資料分析（EDA）與驗證性分析（CDA）最大的核心差別在於？", o: ["EDA 強調無需預設假設，強調靈活開放的探索過程", "EDA 只能計算平均數", "EDA 核心在於嚴格拒絕虛無假設", "base兩者沒有任何技術上的差別"], a: 0, r: "這是 EDA 的本質，著重生成初步假說。", h: "一個是沒有預設立場去找規律，一個是帶著想法去證明。" },
    { n: 34, q: "專門用於「展示多個變量兩兩之間的相關性，適合高維度初步探索」的是？", o: ["折線圖", "散佈圖矩陣", "直方圖", "卡方檢定"], a: 1, r: "散佈圖矩陣能把多個變量成對的散佈圖整合成大矩陣展示。", h: "它是把好幾個散佈圖排成一個「矩陣」大圖。" },
    { n: 35, q: "熱圖（Heatmap）在探索性資料分析中的主要呈現特點是？", o: ["透過色彩強度展示數據項目之間的關聯程度", "利用立體柱狀高度代表時間", "將資料全部轉為一維度直線", "自動隱藏所有的離群點"], a: 0, r: "色彩深淺或冷暖能直觀凸顯相關係數的高低。", h: "它利用「顏色」的深淺或溫度感來看數據的相關性。" },
    { n: 36, q: "「展示數據分佈情況，並特別能突出離群值與中位數特徵」的圖表是？", o: ["圓餅圖", "箱型圖/盒鬚圖（Box Plot）", "雷達圖", "散佈圖矩陣"], a: 1, r: "箱型圖由四分位數構成，邊界外的點即為明顯離群值。", h: "它形狀像一個大箱子加上兩條鬍鬚。" },
    { n: 37, q: "「旨在探究數據中特定現象或結果的根本原因」屬於哪種分析？", o: ["敘述性分析", "診斷性分析", "預測性分析", "降維分析"], a: 1, r: "診斷性分析的核心就是探究「為什麼會發生」的原因。", h: "這像醫生看病，要找出致病的「原因」。" },
    { n: 38, q: "銷售額突然下降時，透過地區、產品類別從宏觀數據逐層深入細節，稱為？", o: ["鑽取/向下分析（Drill-down）", "主成分分析", "聚類分析", "假設檢定"], a: 0, r: "向下鑽取能從總量逐層剖析細部發生原因。", h: "動作名稱像是在鑽井一樣「越挖越深」。" },
    { n: 39, q: "經典診斷分析案例「啤酒與尿布的共現關係」，是利用了哪種分析技術？", o: ["因果分析", "關聯分析（Association Analysis）", "趨勢外推", "敘述性平均值比較"], a: 1, r: "Apriori 等演算法用於挖掘購物車中品項的關聯規則。", h: "尋找物品一起在購物車內被買走的「關聯性」。" },
    { n: 40, q: "若要嚴格避免「混淆相關性與因果性」，通常會透過統計與何種實驗方法？", o: ["直接複製網路資料", "因果分析（如 A/B 測試隨機試驗）", "K-Means 分群", "網格搜索"], a: 1, r: "控制變數的隨機試驗是檢驗行銷或產品因果效應的最嚴記方法。", h: "這是互聯網公司常用來測試新舊功能版本效果的方法。" },
    { n: 41, q: "預測性分析（Predictive Analysis）本質上是基於歷史數據與？", o: ["統計方法與機器學習模型", "主觀直覺與第六感", "No code 平台的圖形外觀顏色", "政府的保密合規文件"], a: 0, r: "預測分析仰賴模型從歷史規律推估未來。", h: "利用數學演算法從舊紀錄學出預測未來可能性的模型。" },
    { n: 42, q: "信用風險評估與疾病惡性/良性診斷，屬於預測分析模型中的？", o: ["迴歸模型", "分類模型（Classification Models）", "降維模型", "時間序列模型"], a: 1, r: "將結果分群判斷至特定標籤（如風險高/低）為分類任務。", h: "結果是把案例劃分到特定「類別」中。" },
    { n: 43, q: "用於分析時間相關數據，捕捉「趨勢、季節性與周期性模式」的模型是？", o: ["二元邏輯迴歸", "時間序列模型（如 ARIMA、LSTM）", "專家系統規則鏈", "K-Means 分群"], a: 1, r: "時間序列模型專門處理具時間順序依賴的特徵發展。", h: "名稱裡就包含了時間二字。" },
    { n: 44, q: "結合多個弱模型共同決定以提高整體預測準確性的方法，稱為？", o: ["線性搜尋技術", "集成學習方法（Ensemble Methods）", "遺缺值填補", "數據正規化"], a: 1, r: "如隨機森林或 XGBoost 透過群體投票融合提升成效。", h: "「三個臭皮匠，勝過一個諸葛亮」的集成融合哲學。" },
    { n: 45, q: "關於線性搜尋（Linear Search）的效率特點，下列敘述何者正確？", o: ["最差情況下需要檢查整個資料集的所有元素", "速度固定比二分搜尋快十倍", "資料集不需要放在記憶體內", "只能搜尋英文字母符號"], a: 0, r: "必須從頭到尾逐個比較，故次數隨資料量線性增長。", h: "如果我們要找的東西恰好在最末端，就得從頭看到尾。" },
    { n: 46, q: "二分搜尋（Binary Search）最關鍵的適用前提條件是？", o: ["資料量必須完全大於一萬條", "資料集必須已經按大小順序排列好（排序）", "必須使用神經網路訓練", "資料必須是圖像格式"], a: 1, r: "已排序才能利用中間值每次砍掉一半搜尋範圍。", h: "如果資料亂七八糟沒有排好，你就無法斷定目標在中間值的左邊還是右邊。" },
    { n: 47, q: "「從起始節點開始，沿著一條路徑儘可能深地搜尋直到葉節點再回溯」是？", o: ["廣度優先搜尋（BFS）", "深度優先搜尋（DFS）", "二分搜尋", "隨機排序"], a: 1, r: "DFS 沿單一路徑垂直垂直深入遍歷探索。", h: "縮寫是三個字母，第一個字代表深度（Depth）。" },
    { n: 48, q: "廣度優先搜尋（BFS）在遍歷圖形或樹狀結構時的特點是？", o: ["一條路走到底絕不回頭", "從起始節點開始，一層一層地向外擴散搜尋", "不需要消耗任何記憶體空間", "直接利用 Sigmoid 函數計算機率"], a: 1, r: "BFS 優先訪問所有相鄰節點再進入下一層。", h: "就像是在水面上丟石頭，波紋一層一層往外擴散。" },
    { n: 49, q: "線性迴歸（Linear Regression）最適合解決下列哪一種類型的問題？", o: ["判斷電子郵件是否為垃圾郵件（二元分類）", "預測連續數值型的輸出變數（如房價、銷售額）", "將客戶分成三個未知標籤的群組", "自動創作一段古典鋼琴音樂"], a: 1, r: "線性迴歸專注於預測連續性數值型目標。", h: "尋找輸出是連續數值而非分類標籤的選項。" },
    { n: 50, q: "邏輯迴歸（Logistic Regression）雖然名稱有迴歸，本質上是？", o: ["一種用於解決二元分類問題的演算法", "專門用來降低數據特徵維度的降維工具", "一種非監督式的圖像聚類演算法", "硬體伺服器的散熱控制程式"], a: 0, r: "它常用於計算屬於某類別的條件機率進行二元分類。", h: "它被廣泛用來回答是否、良性惡性這種一分為二的問題。" },
    { n: 51, q: "邏輯迴歸如何將線性模型的輸出值轉換為介於 0 和 1 之間的機率值？", o: ["透過 Sigmoid 函數進行映射變換", "直接將負數全部刪除", "利用四分位距法截斷", "乘以樣本總數 n"], a: 0, r: "Sigmoid 函數公式能將任意實數縮放至 (0,1) 機率區間。", h: "這是一個形狀像 S 型的經典數學函數。" },
    { n: 52, q: "K-最近鄰演算法（KNN）在面臨新的輸入樣本時，其基本運作原理是？", o: ["自動生成全新的對抗網路", "外找出訓練集中與其最接近的 K 個樣本進行投票或平均", "在大量的未標記文本中自行提取深層特徵", "將所有數據的標準差強制設為零"], a: 1, r: "KNN 依賴空間距離找出最近的鄰居共同決定輸出。", h: "俗話說物以類聚，看看離新樣本最近的幾個鄰居是哪一類。" },
    { n: 53, q: "根據文件模擬考題，機器學習模型的三個核心要素是指？", o: ["硬體、網路、作業系統", "數據（Data）、模型（Model）、損失函數（Loss Function）", "行銷預算、股東權益、產品定價", "No code 介面、拖放按鈕、雲端空間"], a: 1, r: "此三者共同構成了機器學習訓練優化的基石。", h: "回想 3-44 頁模擬考題第 1 題的核心概念。" },
    { n: 54, q: "關於機器學習的一般規律，下列哪項敘述是正確的？", o: ["資料量愈小，模型的效果通常會愈好", "資料量愈大且經過完整的資料處理，模型的效果通常會更好", "模型效果完全由優化器的顏色決定", "資料處理過程對模型最終效果毫無任何影響"], a: 1, r: "機器學習高度依賴高品質與大規模數據進行規律學習。", h: "高品質的豐沛數據是機器學習進步的燃料。" },
    { n: 55, q: "「以有標記的數據為基礎，學習輸入與輸出之間的映射關係」是指？", o: ["監督式學習（Supervised Learning）", "非監督式學習", "專家系統硬編碼", "隨機猜測演算法"], a: 0, r: "有正確答案標記指導的學習即為監督式學習。", h: "就像是有一個老師在旁邊批改作業，告訴你正確答案。" },
    { n: 56, q: "非監督式學習（Unsupervised Learning）的核心任務目標通常包括？", o: ["房價的精準連續數值預測", "垃圾郵件二元精確分類", "數據的內在結構分群（Clustering）與特徵降維", "下圍棋與環境互動獲取累積最高獎勵"], a: 2, r: "在無標記下尋找潛在相似性與壓縮特徵是非監督核心。", h: "在沒有標準正確答案標籤的情況下自行分組或簡化特徵。" },
    { n: 57, q: "「基於回饋機制，透過評分與獎勵朝獲取最大獎勵方向學習」的是？", o: ["監督式學習", "非監督式學習", "強化學習（Reinforcement Learning）", "線性搜尋"], a: 2, r: "強化學習藉由與環境動態試錯互動並最大化累積獎勵。", h: "像是訓練寵物，做對了就給點心（獎勵），做錯了就沒有。" },
    { n: 58, q: "強化學習的三個絕對核心基本要素分別是指哪些？", o: ["代理（Agent）、環境（Environment）、獎勵（Reward）", "輸入層、隱藏層、輸出層", "平均數、中位數、標準差", "買方、賣方、第三方供應商"], a: 0, r: "此三要素在互動閉環中不斷演進更新策略。", h: "核心要素包含執行動作的主體、主體所處的場景、以及表現好壞的回饋。" },
    { n: 59, q: "相較於傳統機器學習，深度學習（Deep Learning）最顯著的優勢是？", o: ["不需要使用任何計算資源", "能自動從大量數據中提取深層抽象特徵，減少手動特徵工程", "模型完全是由黑盒變為百分之百可解釋", "只能處理結構化的資料庫表格"], a: 1, r: "多層網路能自動發現抽象表徵，免去人工設計特徵難題。", h: "它讓模型自行學習特徵，把人類從手動設計特徵的苦工中解放出來。" },
    { n: 60, q: "深度學習中，「設計靈感來自生物學視覺皮層，特別擅長圖像處理」的是？", o: ["卷積神經網路（CNN）", "循環神經網路（RNN）", "專家系統規則樹", "ARIMA 模型"], a: 0, r: "CNN 藉由卷積核提取局部特徵，最擅長電腦視覺任務。", h: "簡寫是三個字母，第一個字母代表卷積（Convolutional）" },
    { n: 61, q: "在卷積神經網路（CNN）的結構中，卷積層（Convolutional Layer）主要功能是？", o: ["隨機刪除一半的圖像畫素", "透過卷積運算提取數據的局部特徵（如邊緣、紋理）", "將特徵扁平化映射到最後輸出類別空間", "自動進行客戶問卷數據蒐集"], a: 1, r: "這是卷積層過濾器提取特徵的核心職責。", h: "它利用滑動視窗（矩陣）來抓取局部的線條與形狀特徵。" },
    { n: 62, q: "CNN 中的「池化層（Pooling Layer）」其核心主要操作目的為何？", o: ["增加圖像的解析度放大細節", "透過降維操作減少數據維度，並有助於防止過擬合", "將模型轉換為非線性邏輯迴歸", "設計損失函數懲罰項"], a: 1, r: "最大池化或平均池化能壓縮特徵並保留核心精華。", h: "常用方式有最大池化（Max Pooling），具有過濾、濃縮與降維效果。" },
    { n: 63, q: "主要用於處理文字、語音等「具有時間序列與前後上下文序列特性數據」的是？", o: ["傳統 KNN 演算法", "循環神經網路（RNN）", "純粹最大池化層", "卡方獨立性檢定"], a: 1, r: "RNN 節點內具有循環連接，能記憶序列先前的資訊。", h: "名稱中帶有循環（Recurrent）的意思。" },
    { n: 64, q: "RNN 在處理非常長的序列數據時，反向傳播中最常遇到的嚴重缺點是？", o: ["無法處理非結構化文字", "容易出現梯度消失或梯度爆炸問題", "參數量自動變為零", "不再需要消耗任何硬體計算資源"], a: 1, r: "長距離時間步反向傳播連乘會導致梯度極端不穩定。", h: "這會導致它得健忘症，記不住太久以前的上下文資訊。" },
    { n: 65, q: "長短期記憶網路（LSTM）主要透過何種機制設計成功解決了 RNN 的梯度消失？", o: ["直接刪除所有隱藏層", "引入遺忘門、輸入門和輸出門等門控機制", "改用線性迴歸直線公式", "縮小資料量到十筆以內"], a: 1, r: "透過控制閘門決定資訊留存，維持梯度長距離穩定流動。", h: "利用各種特殊的門（Gate）來精細控制記憶的寫入與遺忘。" },
    { n: 66, q: "生成對抗網路（GAN）是由哪兩個彼此對抗學習的神經網路所組成？", o: ["編碼器與解碼器", "生成器（Generator）與判別器（Discriminator）", "輸入層與全連接層", "微調網路與優化器"], a: 1, r: "生成器造假，判別器抓假，兩者在對抗中進步。", h: "一個負責無中生有搞造假，另一個負責明察秋毫做判斷真偽。" },
    { n: 67, q: "在 GAN 模型訓練中，生成器（Generator）的終極奮鬥目標是？", o: ["精準將影像進行二元降維", "生成極度逼真數據以成功「欺騙」判別器", "幫助企業計算出最高的 ROI 財務數值", "將所有輸入轉換為一維文字字串"], a: 1, r: "生成器試圖讓判別器無法區分自己產出的樣本是真是假。", h: "它的工作就是要把假鈔印得跟真鈔一模一樣，讓驗鈔機（判別器）抓不到。" },
    { n: 68, q: "大語言模型等生成式 AI 逐字生成回應的內在核心底層數學原理是？", o: ["在大量的文本資料所建立的「文字機率分布」中尋找最可能接續的字", "硬性死記硬背字典裡的字串順序", "由後台的人類工程師即時打字回覆", "強制將所有字串對應至 Z-score 均值 0"], a: 0, r: "生成式 AI 依賴預測下一個最可能出現單詞的條件機率分布運作。", h: "它是在大量訓練後，計算出這個字後面最常接哪一個字的機率。" },
    { n: 69, q: "生成式 AI 在基本預訓練完畢後的第二階段稱為「微調」，其主要目的是？", o: ["刪除所有之前學過的語言規律", "使用特定領域或任務的數據進一步訓練，以提升模型在特定任務的表現", "隨機將所有內部權重參數歸零重來", "降低硬體伺服器的電力消耗"], a: 1, r: "微調能將通才模型轉化為特定領域專家（如法律、醫療）。", h: "就像是大學通才教育畢業後，再進入特定科系進行專業訓練。" },
    { n: 70, q: "機器學習中，為防範過擬合（Overfitting），在損失函數中添加懲罰項的技術稱為？", o: ["數據標準化", "正則化（Regularization，如 L1、L2 正則化）", "數據增強", "核採樣技術"], a: 1, r: "正則化藉由懲罰過大權重強迫模型保持簡單、提高泛化力。", h: "這是在公式裡加入限制，給太過複雜的模型扣分（懲罰）。" },

// 動態生成 HTML 題目結構
const container = document.getElementById('quizContainer');
quizData.forEach((item, idx) => {
    const quizItem = document.createElement('div');
    quizItem.className = 'quiz-item';
    
    let optionsHtml = '';
    item.o.forEach((opt, optIdx) => {
        const letter = String.fromCharCode(65 + optIdx); // A, B, C, D
        optionsHtml += `
            <li>
                <label>
                    <input type="radio" name="q${item.n}" value="${optIdx}" onchange="checkImmediate(${idx}, ${optIdx})">
                    (${letter}) ${opt}
                </label>
            </li>
        `;
    });
    
    quizItem.innerHTML = `
        <div class="question">Q${item.n}. ${item.q}</div>
        <ul class="options">${optionsHtml}</ul>
        <div class="feedback" id="feedback${idx}"></div>
    `;
    container.appendChild(quizItem);
});

// 即時選取回饋機制
function checkImmediate(quizIdx, selectedIdx) {
    const item = quizData[quizIdx];
    const feedbackDiv = document.getElementById(`feedback${quizIdx}`);
    const correctLetter = String.fromCharCode(65 + item.a);
    
    feedbackDiv.style.display = 'block';
    
    if (selectedIdx === item.a) {
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.innerHTML = `<b>✨ 答對了！</b> 正確答案是 (${correctLetter})。<div class="rationale">${item.r}</div>`;
    } else {
        feedbackDiv.className = 'feedback incorrect';
        feedbackDiv.innerHTML = `<b>❌ 答錯囉！</b> 再想想看。提示：${item.h}`;
    }
}

// 最終交卷統計分數與上傳雲端資料庫
// 🚀 核心升級五：修改 calculateScore 功能，強制填寫姓名並將數據即時寫入 Firebase
function calculateScore() {
    // 檢查是否有輸入暱稱
    const nickname = document.getElementById('username').value.trim();
    if (!nickname) {
        alert("⚠️ 交卷前請先填寫最上方的姓名或暱稱喔！");
        document.getElementById('username').focus();
        return;
    }

    let score = 0;
    let unanswered = 0;
    
    quizData.forEach((item, idx) => {
        const radios = document.getElementsByName(`q${item.n}`);
        let checkedIdx = -1;
        for (let i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
                checkedIdx = i;
                break;
            }
        }
        
        if (checkedIdx === -1) {
            unanswered++;
            const feedbackDiv = document.getElementById(`feedback${idx}`);
            feedbackDiv.style.display = 'block';
            feedbackDiv.className = 'feedback incorrect';
            feedbackDiv.innerHTML = `<b>⚠️ 本題未作答！</b> 提示：${item.h}`;
        } else if (checkedIdx === item.a) {
            score++;
        }
        
        const feedbackDiv = document.getElementById(`feedback${idx}`);
        const correctLetter = String.fromCharCode(65 + item.a);
        if (checkedIdx !== item.a) {
            feedbackDiv.innerHTML += `<div class="rationale" style="margin-top:8px; border-top:1px dashed #fca5a5; padding-top:5px;"><b>💡 正確答案詳解：</b>(${correctLetter}) ${item.r}</div>`;
        }
    });
    
    // 📊 核心同步功能：交卷時將數據異步寫入 Firebase Realtime Database
    try {
        const timestamp = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
        database.ref('quiz_results').push({
            name: nickname,
            correctCount: score,
            totalQuestions: quizData.length,
            scorePercentage: score, // 每題 1 分，滿分 100
            submitTime: timestamp
        });
    } catch (e) {
        console.error("雲端同步失敗，請檢查 Firebase 設定網址：", e);
    }
    
    // 顯示結果盒
    const resultBox = document.getElementById('resultBox');
    const scoreResult = document.getElementById('scoreResult');
    resultBox.style.display = 'block';
    
    let alertMsg = unanswered > 0 ? `<p style="color:#d97706;">⚠️ 您還有 ${unanswered} 題尚未作答！</p>` : '';
    
    scoreResult.innerHTML = `
        ${alertMsg}
        <div><b>${nickname}</b> 同學，您的總得分為：</div>
        <div class="score">${score} / 100 分</div>
        <div>答對題數：${score} 題 | 答錯/未答：${100 - score} 題</div>
    `;
    
    resultBox.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
